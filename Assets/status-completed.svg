<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100%" height="100%">
  <defs>
    <style>
      @keyframes pulse-completed {
        0%, 100% {
          transform: scale(1);
          opacity: 1;
        }
        50% {
          transform: scale(1.05);
          opacity: 0.85;
        }
      }
      @keyframes draw-check {
        to {
          stroke-dashoffset: 0;
        }
      }
      .completed-bg {
        fill: #F0FDF4;
        stroke: #DCFCE7;
        stroke-width: 4;
      }
      .completed-ring {
        fill: none;
        stroke: #22C55E;
        stroke-width: 3;
        stroke-dasharray: 12 6;
      }
      .completed-check {
        stroke: #15803D;
        stroke-width: 6;
        stroke-linecap: round;
        stroke-linejoin: round;
        fill: none;
        stroke-dasharray: 60;
        stroke-dashoffset: 60;
        animation: draw-check 1.2s cubic-bezier(0.4, 0, 0.2, 1) forwards;
      }
      .pulse-group {
        transform-origin: 50px 50px;
        animation: pulse-completed 2.5s ease-in-out infinite;
      }
    </style>
  </defs>
  <g class="pulse-group">
    <!-- Soft green background circle -->
    <circle class="completed-bg" cx="50" cy="50" r="42" />
    <!-- Outer dashed highlight ring -->
    <circle class="completed-ring" cx="50" cy="50" r="45" />
    <!-- Self-drawing green checkmark -->
    <path class="completed-check" d="M32 50 L45 62 L68 36" />
  </g>
</svg>
