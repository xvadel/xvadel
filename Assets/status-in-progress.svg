<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100%" height="100%">
  <defs>
    <style>
      @keyframes spin-ring {
        0% {
          transform: rotate(0deg);
        }
        100% {
          transform: rotate(360deg);
        }
      }
      @keyframes pulse-core {
        0%, 100% {
          transform: scale(1);
          opacity: 0.9;
          filter: drop-shadow(0 0 2px rgba(249, 115, 22, 0.4));
        }
        50% {
          transform: scale(1.15);
          opacity: 0.6;
          filter: drop-shadow(0 0 8px rgba(249, 115, 22, 0.8));
        }
      }
      .progress-bg {
        fill: #FFF7ED;
        stroke: #FFEDD5;
        stroke-width: 4;
      }
      .progress-ring {
        fill: none;
        stroke: #F97316;
        stroke-width: 3;
        stroke-dasharray: 20 12;
        transform-origin: 50px 50px;
        animation: spin-ring 4s linear infinite;
      }
      .progress-core {
        fill: #EA580C;
        transform-origin: 50px 50px;
        animation: pulse-core 1.8s ease-in-out infinite;
      }
    </style>
  </defs>
  <!-- Orange tint background circle -->
  <circle class="progress-bg" cx="50" cy="50" r="42" />
  <!-- Spinning dashed progress ring -->
  <circle class="progress-ring" cx="50" cy="50" r="45" />
  <!-- Pulsing core circle -->
  <circle class="progress-core" cx="50" cy="50" r="16" />
</svg>
